<!DOCTYPE html>
<html>
<head>
    <title>Libros</title>
</head>
<body>

<h1>Listado de Libros</h1>

<a href="/">Volver</a>

<br><br>

<!-- CREATE -->
<a href="/libros/nuevo">➕ Crear libro</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>ISBN</th>
        <th>Año</th>
        <th>Stock</th>
        <th>Autor</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>

    {% for l in libros %}
    <tr>
        <td>{{ l[0] }}</td>
        <td>{{ l[1] }}</td>
        <td>{{ l[2] }}</td>
        <td>{{ l[3] }}</td>
        <td>{{ l[4] }}</td>
        <td>{{ l[5] }}</td>
        <td>{{ l[6] }}</td>

        <td>
            <a href="/libros/editar/{{ l[0] }}">✏️ Editar</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
