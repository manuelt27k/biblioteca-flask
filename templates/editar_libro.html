<!DOCTYPE html>
<html>
<head><title>Editar Libro</title></head>
<body>

<h1>Editar Libro</h1>

<form method="POST">

    Título:<br>
    <input type="text" name="titulo" value="{{ libro[1] }}"><br><br>

    ISBN:<br>
    <input type="text" name="isbn" value="{{ libro[2] }}"><br><br>

    Año:<br>
    <input type="number" name="anio" value="{{ libro[3] }}"><br><br>

    Stock:<br>
    <input type="number" name="stock" value="{{ libro[4] }}"><br><br>

    <button type="submit">Actualizar</button>

</form>

<a href="/libros">Volver</a>

</body>
</html>
